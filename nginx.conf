events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _; # Fallback for any host
        merge_slashes on;

        # Superset (Main App)
        location / {
            set $superset_upstream superset:8088;
            proxy_pass http://$superset_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 300s;
            
            proxy_buffering off;
        }

        # Prefect UI
        location /prefect/ {
            proxy_pass http://prefect:4200/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'href="/assets/' 'href="/prefect/assets/';
            sub_filter 'src="/assets/' 'src="/prefect/assets/';
            sub_filter 'href="/favicon' 'href="/prefect/favicon';
            sub_filter 'href="/apple-touch-icon' 'href="/prefect/apple-touch-icon';
            sub_filter_types text/html;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cube.js API & Playground
        location /cubejs/ {
            proxy_pass http://cube:4000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Keycloak
        location /auth/ {
            set $keycloak_upstream keycloak:8080;
            proxy_pass http://$keycloak_upstream/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus
        location /prometheus/ {
            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # cAdvisor
        location /cadvisor/ {
            set $cadvisor_upstream cadvisor:8080;
            proxy_pass http://$cadvisor_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'href="/' 'href="/cadvisor/';
            sub_filter 'src="/' 'src="/cadvisor/';
            sub_filter 'action="/' 'action="/cadvisor/';
            sub_filter '"/' '"/cadvisor/';
            sub_filter_types text/html text/css application/javascript;
        }
        # Flowise AI
        location /flowise/ {
            set $flowise_upstream flowise:3001;
            proxy_pass http://$flowise_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Flowise
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Vanna AI API
        location /vanna/ {
            proxy_pass http://vanna-ai:8011/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # PeerDB UI (CDC Management — Restringir acceso con autenticación en producción)
        location /peerdb/ {
            set $peerdb_upstream peerdb:8085;
            proxy_pass http://$peerdb_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support para PeerDB UI
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Superset MCP SSE
        location /mcp/ {
            set $mcp_upstream superset-mcp:8010;
            rewrite ^/mcp/(.*) /$1 break;
            proxy_pass http://$mcp_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE specific headers
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            chunked_transfer_encoding off;
        }
        # OpenMetadata (Governance & Catalog)
        location /catalog/ {
            set $om_upstream openmetadata-server:8585;
            proxy_pass http://$om_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for OpenMetadata
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

