events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _; # Fallback for any host
        merge_slashes on;

        # Superset (Main App)
        location / {
            set $superset_upstream superset:8088;
            proxy_pass http://$superset_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 300s;
            
            proxy_buffering off;
        }

        # Prefect UI
        location /prefect/ {
            set $prefect_upstream prefect:4200;
            proxy_pass http://$prefect_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'href="/assets/' 'href="/prefect/assets/';
            sub_filter 'src="/assets/' 'src="/prefect/assets/';
            sub_filter 'href="/favicon' 'href="/prefect/favicon';
            sub_filter 'href="/apple-touch-icon' 'href="/prefect/apple-touch-icon';
            sub_filter_types text/css application/javascript;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Grafana
        location /grafana/ {
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cube.js API & Playground
        location /cubejs/ {
            set $cube_upstream cube:4000;
            proxy_pass http://$cube_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Keycloak
        location /auth/ {
            set $keycloak_upstream keycloak:8080;
            proxy_pass http://$keycloak_upstream/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus
        location /prometheus/ {
            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # cAdvisor
        location /cadvisor/ {
            set $cadvisor_upstream cadvisor:8080;
            proxy_pass http://$cadvisor_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'href="/' 'href="/cadvisor/';
            sub_filter 'src="/' 'src="/cadvisor/';
            sub_filter 'action="/' 'action="/cadvisor/';
            sub_filter '"/' '"/cadvisor/';
            sub_filter_types text/css application/javascript;
        }
        # Flowise AI
        location = /flowise {
            return 301 $scheme://$http_host/flowise/;
        }
        location /flowise/ {
            set $flowise_upstream flowise:3001;
            rewrite ^/flowise/(.*) /$1 break;
            proxy_pass http://$flowise_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Flowise
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            sub_filter 'href="/' 'href="/flowise/';
            sub_filter 'src="/' 'src="/flowise/';
            sub_filter_once off;
        }
        
        # Grafana redirect
        location = /grafana {
            return 301 $scheme://$http_host/grafana/;
        }

        # Vanna AI API
        location /vanna/ {
            set $vanna_upstream vanna-ai:8011;
            proxy_pass http://$vanna_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redpanda Console
        location = /redpanda {
            return 301 $scheme://$http_host/redpanda/;
        }
        location /redpanda/ {
            set $redpanda_upstream redpanda-console:8080;
            rewrite ^/redpanda/(.*) /$1 break;
            proxy_pass http://$redpanda_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Redpanda Console
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Superset MCP SSE
        location /mcp/ {
            set $mcp_upstream superset-mcp:8010;
            rewrite ^/mcp/(.*) /$1 break;
            proxy_pass http://$mcp_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE specific headers
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            chunked_transfer_encoding off;
        }
        # OpenMetadata (Governance & Catalog)
        location /catalog/ {
            set $om_upstream openmetadata-server:8585;
            proxy_pass http://$om_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for OpenMetadata
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

